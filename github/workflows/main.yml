name: Buduj APK
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Buildozer Action
        uses: ArtemSerebrennkov/buildozer-action@v1
        with:
          command: buildozer android debug
      - name: Pobierz APK
        uses: actions/upload-artifact@v2
        with:
          name: Siedlik_APK
          path: bin/*.apk
