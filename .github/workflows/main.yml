
name: Build APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build with Buildozer
        # Używamy tej akcji, bo poprzednia ma błędy w nazwie lub nie istnieje
        uses: its-term/buildozer-action@v1
        with:
          command: buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Siedlik_System_App
          path: bin/*.apk
