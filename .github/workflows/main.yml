
name: Build APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest  # Automatycznie wybierze najnowszą stabilną wersję (22.04/24.04)
    steps:
      - uses: actions/checkout@v4  # Aktualizacja do v4

      - name: Build with Buildozer
        uses: ArtemSerebrennkov/buildozer-action@v1
        with:
          command: buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4  # Aktualizacja do v4
        with:
          name: Siedlik_System_App
          path: bin/*.apk
