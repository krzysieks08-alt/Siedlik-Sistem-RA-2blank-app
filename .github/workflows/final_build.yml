
name: Build APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git python3-dev python3-pip libffi-dev libssl-dev libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good libgstreamer-plugins-base1.0-dev libgstreamer-plugins-good1.0-dev libsqlite3-dev sqlite3 zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncursesw5-dev cmake libltdl-dev
          pip install --user --upgrade pip
          pip install --user "cython<3.0" wheel buildozer

      - name: Build with Buildozer
        run: |
          export PATH=$PATH:$HOME/.local/bin
          # Automatyczne akceptowanie licencji wewnątrz Buildozera
          mkdir -p ~/.android && touch ~/.android/repositories.cfg
          buildozer android debug || buildozer android debug
        env:
          BUILDOZER_WARN_ON_ROOT: 0
          BUILDOZER_ACCEPT_ANDROID_SDK_LICENSE: 1
          APP_ANDROID_ACCEPT_SDK_LICENSE: "1"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: bin/*.apk
